<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burilar — あらゆるトピックを追跡。すべてを把握。</title>
    <meta name="description" content="Burilarは、あなたが関心を持つトピックをウェブ上で監視し、AIがキュレーションしたアップデートをお届けします。重要な情報を見逃しません。" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Noto Sans JP', 'system-ui', 'sans-serif'],
              jp: ['Noto Sans JP', 'Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              accent: { DEFAULT: '#fcaa2d', hover: '#e89a1f', deep: '#e8850a' },
            },
          },
        },
      };
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; background: #ffffff; color: #0a0a0a; }

      /* Floating orb animations */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      @keyframes float-delayed {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-30px) rotate(3deg); }
      }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }
      @keyframes gradient-shift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes tab-progress {
        from { width: 0%; }
        to { width: 100%; }
      }
      @keyframes typing-cursor {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes count-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes grid-line-pulse {
        0%, 100% { opacity: 0.03; }
        50% { opacity: 0.08; }
      }
      @keyframes dash-flow {
        to { stroke-dashoffset: -20; }
      }
      @keyframes scale-in {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .animate-float { animation: float 6s ease-in-out infinite; }
      .animate-float-delayed { animation: float-delayed 8s ease-in-out infinite; }
      .animate-pulse-glow { animation: pulse-glow 4s ease-in-out infinite; }
      .animate-gradient { animation: gradient-shift 6s ease infinite; background-size: 200% 200%; }
      .animate-spin-slow { animation: spin-slow 20s linear infinite; }
      .animate-tab-progress { animation: tab-progress 4s linear; }
      .animate-cursor { animation: typing-cursor 1s ease-in-out infinite; }
      .animate-scale-in { animation: scale-in 0.5s ease-out forwards; }
      .animate-shimmer { animation: shimmer 2s ease-in-out infinite; background-size: 200% 100%; }

      .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
      .glass-strong { background: rgba(255,255,255,0.12); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.15); }

      .hero-gradient {
        background: linear-gradient(180deg,
          #060612 0%,
          #080824 6%,
          #0a0a2e 12%,
          #0c1454 22%,
          #0a2e8a 34%,
          #0052cc 44%,
          #0087e1 54%,
          #4db8e8 64%,
          #8dd0f0 72%,
          #c4e6f7 80%,
          #e8f4fb 88%,
          #f5fafd 94%,
          #ffffff 100%
        );
      }

      /* Grid background pattern */
      .grid-bg {
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* Noise texture overlay */
      .noise-overlay::before {
        content: '';
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
